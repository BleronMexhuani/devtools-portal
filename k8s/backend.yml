apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: devtools-portal
type: Opaque
stringData:
  JWT_SECRET: change-me-to-a-secure-random-string
  ADMIN_EMAIL: admin@example.com
  ADMIN_PASSWORD: changeme123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devtools-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: devtools-portal-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: MONGODB_URI
              value: mongodb://mongodb.devtools-portal.svc.cluster.local:27017/devtools-portal
            - name: CORS_ORIGIN
              value: "http://frontend.devtools-portal.svc.cluster.local"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: ADMIN_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: devtools-portal
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
